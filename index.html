<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Шар памяти — отпусти воспоминание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #c5b697 0%, #f8db98 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Карточка */
        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 48px;
            padding: 28px 24px 36px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 32px;
            font-weight: 600;
            background: linear-gradient(135deg, #000000, #000000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .sub {
            color: #000000;
            font-size: 15px;
            margin-bottom: 28px;
            border-bottom: 1px solid #000000;
            display: inline-block;
            padding-bottom: 6px;
        }

        /* Поля ввода */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #000000;
            margin-bottom: 6px;
            margin-left: 8px;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            font-size: 16px;
            border: 1.5px solid #000000;
            border-radius: 44px;
            background: #ffffff;
            transition: 0.2s;
            outline: none;
            font-family: inherit;
        }

        input:focus {
            border-color: #8b6bbd;
            box-shadow: 0 0 0 3px rgba(139, 107, 189, 0.2);
        }

        /* Кнопка */
        .send-btn {
            background: linear-gradient(105deg, #000000, #000000);
            border: none;
            color: white;
            font-size: 18px;
            font-weight: 600;
            padding: 16px 24px;
            border-radius: 60px;
            width: 100%;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.1);
        }

        .send-btn:active {
            transform: scale(0.97);
        }

        /* Зона анимации (скрыта сначала) */
        .animation-area {
            display: none;
            margin-top: 20px;
            position: relative;
            min-height: 380px;
        }

        .balloon-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .balloon {
            position: relative;
            width: 180px;
            height: 200px;
            cursor: pointer;
            animation: floatUp 3.2s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        .balloon-body {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,240,0.95), #ff8c8c);
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .balloon-text {
            color: white;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            font-size: 18px;
            padding: 12px;
            word-break: break-word;
            max-width: 140px;
        }

        .string {
            position: absolute;
            bottom: -38px;
            left: 50%;
            width: 2.5px;
            height: 50px;
            background: #a5673f;
            transform: translateX(-50%);
        }

        .knot {
            position: absolute;
            bottom: -12px;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #c27e4a;
            border-radius: 2px;
            transform: translateX(-50%) rotate(45deg);
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            70% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(-420px) rotate(8deg);
                opacity: 0;
            }
        }

        .after-message {
            margin-top: 40px;
            font-size: 14px;
            color: #2c3e66;
            background: #f0f7fe;
            padding: 12px 20px;
            border-radius: 60px;
            display: inline-block;
        }

        .reset-btn {
            background: #eef2fa;
            border: none;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            margin-top: 24px;
            color: #4a5b7a;
            cursor: pointer;
            width: auto;
        }

        footer {
            margin-top: 28px;
            font-size: 12px;
            color: #8d9bb0;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

<div class="card" id="mainCard">
    <h1>Шар памяти</h1>
    <div class="sub">лети высоко, друг</div>

    <!-- Форма -->
    <div id="formBlock">
        <div class="input-group">
            <label>Имя питомца</label>
            <input type="text">
        </div>
        <div class="input-group">
            <label>💬 Слово или фраза</label>
            <input type="text">
        </div>
        <button class="send-btn">
            Отпустить шар
        </button>
    </div>

    <!-- Анимация (шары) -->
    <div id="animationBlock" class="animation-area">
        <div class="balloon-wrapper">
            <div class="balloon" id="floatingBalloon">
                <div class="balloon-body" id="balloonBody">
                    <div class="balloon-text" id="balloonText">Барсик<br>❤️ спасибо</div>
                </div>
                <div class="string"></div>
                <div class="knot"></div>
            </div>
        </div>
        <div class="after-message" id="afterMessage">Твой шар улетает в небо...</div>
        <button class="reset-btn" id="resetBtn">Отправить ещё один шар</button>
    </div>

    <footer>память остаётся с тобой навсегда</footer>
</div>

<script>
    // Яркие, тёплые цвета шаров
    const colors = [
        '#C4F898', '#98E3F8', '#A798F8', '#F898C3', '#F898A1', '#F8B698', '#F8EC98', '#98B3F8'
    ];

    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetBtn');
    const formBlock = document.getElementById('formBlock');
    const animationBlock = document.getElementById('animationBlock');
    const petNameInput = document.getElementById('petName');
    const messageInput = document.getElementById('message');
    const balloonText = document.getElementById('balloonText');
    const balloonBody = document.getElementById('balloonBody');
    const afterMessageDiv = document.getElementById('afterMessage');

    // Функция для мягких сообщений после отправки
    function getRandomMessage() {
        const messages = [
            'Лети, маленький друг...',
            'Твоя любовь в небе',
            'Память становится светом',
            'Он/она всегда рядом',
            'Ветер уносит боль, оставляя тепло'
        ];
        return messages[Math.floor(Math.random() * messages.length)];
    }

    // Запуск шара
    function launchBalloon(pet, msg) {
        if (!pet || !msg) return false;

        // Случайный цвет
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        balloonBody.style.background = `radial-gradient(circle at 30% 30%, #fff, ${randomColor})`;
        
        // Текст: имя и фраза
        balloonText.innerHTML = `${escapeHtml(pet)}<br>${escapeHtml(msg)}`;
        
        // Меняем текст после отправки
        afterMessageDiv.textContent = getRandomMessage();
        
        // Показываем анимацию, скрываем форму
        formBlock.classList.add('hidden');
        animationBlock.style.display = 'block';
        
        // Убираем класс hidden, чтобы блок появился корректно
        setTimeout(() => {
            animationBlock.style.opacity = '1';
        }, 10);
        
        // Через 3.4 секунды анимация закончится, показываем кнопку "отправить ещё"
        // (но сама анимация остаётся видимой до ресета)
        setTimeout(() => {
            afterMessageDiv.innerHTML = 'Ты не один. Твоя память осталась здесь';
        }, 3200);
    }

    // Простая защита от XSS
    function escapeHtml(str) {
        if (!str) return '';
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    // Сброс — возвращаем форму, убираем шар
    function resetToForm() {
        // Убираем анимацию
        animationBlock.style.display = 'none';
        formBlock.classList.remove('hidden');
        
        // Очищаем поля
        petNameInput.value = '';
        messageInput.value = '';
        
        // Сбрасываем текст шара на дефолтный, чтобы при следующем запуске всё было чистым
        balloonText.innerHTML = 'друг<br>💙';
        balloonBody.style.background = 'radial-gradient(circle at 30% 30%, #fff, #ffb7c5)';
        afterMessageDiv.innerHTML = 'Твой шар улетает в небо...';
    }

    // Обработка отправки
    sendBtn.addEventListener('click', () => {
        const petName = petNameInput.value.trim();
        const message = messageInput.value.trim();
        
        if (!petName || !message) {
            afterMessageDiv.innerHTML = 'Напиши имя и одно слово…';
            afterMessageDiv.style.background = '#fff0e0';
            setTimeout(() => {
                afterMessageDiv.style.background = '#f0f7fe';
                afterMessageDiv.innerHTML = 'Твой шар улетает в небо...';
            }, 1800);
            return;
        }
        
        if (petName.length > 30 || message.length > 50) {
            afterMessageDiv.innerHTML = 'Имя и фраза слишком длинные';
            setTimeout(() => {
                afterMessageDiv.innerHTML = 'Твой шар улетает в небо...';
            }, 1500);
            return;
        }
        
        launchBalloon(petName, message);
    });

    // Кнопка "Отправить ещё один шар"
    resetBtn.addEventListener('click', () => {
        resetToForm();
    });

    // Если случайно захотели отправить ещё до окончания анимации — всё равно корректно
    // Инициализация: форма видна, анимация скрыта
    animationBlock.style.display = 'none';
    formBlock.classList.remove('hidden');
    
    // Красивое сообщение при загрузке
    console.log('Шар памяти готов');
</script>
</body>
</html>
